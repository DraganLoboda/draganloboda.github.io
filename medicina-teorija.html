<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicinska Teorija - Lečenje Oksido-Redukcijom | Dragan Loboda</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; line-height: 1.6; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .back-link { color: #ffcc00; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; font-size: 16px; }
        .pdf-container { width: 100%; height: 850px; border: 2px solid #334155; border-radius: 8px; background: #1e293b; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .book-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .book-title { color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; font-size: 28px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <a href="index.html" class="back-link">⬅ Nazad na početnu stranicu</a>
    
    <div class="book-header">
        <h1 class="book-title">МЕДИЦИНСКА ТЕОРИЈА</h1>
        <h2 style="color: #cbd5e1; margin-top: 0; font-size: 20px;">„ЛЕЧЕЊЕ ОКСИДО-РЕДУКЦИЈОМ“</h2>
        <p style="color: #94a3b8; margin-bottom: 0;">🎁 Poklon knjiga za čitanje - Autor: Dipl. inž. Dragan Loboda</p>
    </div>

    <!-- PROZOR KOJI DIREKTNO PRIKAZUJE VAŠ PROFI PDF IZ ISTORIJE -->
    <div class="pdf-container">
        <iframe src="https://google.com"></iframe>
    </div>
</div>

<script>
    // MAKSIMALNA ZAŠTITA MATERIJALA
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.shiftKey && e.keyCode === 73) || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>
