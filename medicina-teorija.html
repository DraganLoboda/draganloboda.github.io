<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicinska Teorija - Lečenje Oksido-Redukcijom | Dragan Loboda</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; line-height: 1.6; -webkit-user-select: none; user-select: none; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .back-link { color: #ffcc00; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .book-header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .book-title { color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; }
        .content-zone { background: #1e293b; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <a href="index.html" class="back-link">⬅ Nazad na početnu</a>
    
    <div class="book-header">
        <h1 class="book-title">МЕДИЦИНСКА ТЕОРИЈА</h1>
        <h2>„ЛЕЧЕЊЕ ОКСИДО-РЕДУКЦИЈОМ“</h2>
        <p>🎁 Poklon knjiga za čitanje - Autor: Dipl. inž. Dragan Loboda</p>
    </div>

    <!-- BEZBEDNA ZONA GDE KOZA AUTOMATSKI UBACUJE TEKST KNJIŽICE -->
    <div class="content-zone" id="book-content-zone"></div>
</div>

<script>
    // 1. MAKSIMALNA BLOKADA DESNOG KLIKA, SELEKTOVANJA I PREČICA
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.shiftKey && e.keyCode === 73) || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
    });

    // 2. ENKRIPTOVANI TEKST VAŠE PRVE KNJIGE (Base64 format)
    // Trenutno stoji probni tekst. Između navodnika stavljamo vaš ogroman niz sa sajta.
    const encryptedBookData = "PHA+T3ZkZSBjZSBzZSBwcmlraXphdGkgY2VvIHRla3N0IHZhc2UgcHJ2ZSBrbmppZ2Ugb2QgcG9jZXRrYSBkbyBrcmFqYSE8L3A+";

    // KOD AUTOMATSKI DEKRIPTUJE I PRIKAZUJE TEKST ODMAH PRI UČITAVANJU STRANICE
    window.onload = function() {
        const decryptedText = atob(encryptedBookData);
        const targetZone = document.getElementById('book-content-zone');
        targetZone.innerHTML = decryptedText;
        targetZone.style.webkitUserSelect = "none";
        targetZone.style.userSelect = "none";
    };
</script>
</body>
</html>
