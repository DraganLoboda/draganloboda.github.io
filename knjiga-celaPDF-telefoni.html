<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>REDOKS JURIŠ (Mobilna Knjiga) - Protokol Loboda</title>
 <style>
 body {
 font-family: monospace; background-color: #020617; color: #cbd5e1; margin: 0; padding: 0;
 display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
 user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
 }
 .lock-container {
 background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
 border: 2px solid #334155; border-top: 6px solid #38bdf8;
 padding: 40px 30px; border-radius: 12px; text-align: center;
 max-width: 450px; width: 90%; position: relative; z-index: 10000;
 }
 .neon-title { font-size: 1.3em; font-weight: bold; color: #38bdf8; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
 input[type="password"] { width: 80%; padding: 12px 15px; background: #020617; border: 1px solid #334155; border-radius: 6px; color: #00ffcc; font-family: monospace; font-size: 1.1em; text-align: center; outline: none; margin-bottom: 20px; }
 .btn-submit { background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
 .error-msg { color: #ff3366; margin-top: 15px; font-weight: bold; display: none; }
 
 #book-viewer-zone { display: none; width: 100vw; height: 100vh; background-color: #020617; position: fixed; top: 0; left: 0; z-index: 9999; flex-direction: column; }
 .viewer-header { height: 50px; background: #020617; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
 .book-frame { width: 100%; height: calc(100vh - 50px); border: none; background: #020617; }
 </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

 <!-- KAPIJA ZA ŠIFRU -->
 <div class="lock-container" id="lock-screen">
 <div class="neon-title">
 <span style="font-size: 0.7em; color: #94a3b8; display: block; margin-bottom: 5px;">📱 ZA TELEFONE</span>
 🔒 REDOKS JURIŠ<br><span style="font-size: 0.8em; color: #cbd5e1;">Mobilno izdanje</span>
 </div>
 <p style="font-size: 0.9em; line-height: 1.6; margin-bottom: 25px; color: #94a3b8;">Unesite bezbednosnu šifru za pristup originalnom PDF rukopisu.</p>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br>
 <button class="btn-submit" onclick="verifyRedoxVault()">Pristupi</button>
 <div class="error-msg" id="error-box">🛑 KOD NIJE ISPRAVAN!</div>
 </div>

 <!-- PROZOR KNJIŽEVNOG PREGLEDA -->
 <div id="book-viewer-zone">
 <div class="viewer-header">
 <span style="color: #38bdf8; font-weight: bold; font-family: monospace; font-size: 0.9em;">[ZA TELEFONE] 📖 DRAGAN LOBODA - REDOKS JURIŠ</span>
 <span style="color: #64748b; font-size: 0.75em; font-style: italic; font-family: monospace;">Mobilni prikaz</span>
 </div>
 
 <!-- TAČAN EMBED FORMAT LINKA: Rešava izbacivanje sa sajta zauvek i prilagođava se telefonima -->
 <iframe 
 class="book-frame" 
 id="secure-iframe" 
 data-src="https://heyzine.com" 
 allowfullscreen 
 scrolling="no">
 </iframe> 
 </div>

 <script>
 function verifyRedoxVault() {
 var inputPass = document.getElementById("redox-pass").value.trim();
 var errorBox = document.getElementById("error-box");
 var iframe = document.getElementById("secure-iframe");
 
 if (inputPass === "REDOX2026") {
  // Tek nakon tačne lozinke prebacujemo data-src u pravi src i otključavamo knjigu
  iframe.src = iframe.getAttribute("data-src");
  
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("book-viewer-zone").style.display = "flex";
  errorBox.style.display = "none";
  document.getElementById("redox-pass").value = "";
 } else {
  errorBox.style.display = "block";
 }
 }

 document.getElementById("redox-pass").addEventListener("keyup", function(event) {
 if (event.key === "Enter") { verifyRedoxVault(); }
 });
 </script>
</body>
</html>
