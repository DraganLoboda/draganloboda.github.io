<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
 <title>REDOKS JURIŠ - Protokol Loboda</title>
 
 <!-- STABILAN SVETSKI POGON KOJI NE BLOKIRA EKRAN -->
 <script src="https://cloudflare.com"></script>
 
 <style>
 body {
 font-family: monospace;
 background-color: #020617;
 color: #cbd5e1;
 margin: 0; padding: 0;
 user-select: none;
 -webkit-user-select: none;
 overflow: hidden;
 }
 .lock-container {
 background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
 border: 2px solid #334155;
 border-top: 6px solid #38bdf8;
 padding: 40px 30px;
 border-radius: 12px;
 text-align: center;
 max-width: 450px; width: 90%;
 position: fixed; top: 50%; left: 50%;
 transform: translate(-50%, -50%);
 z-index: 10000;
 }
 .neon-title { font-size: 1.3em; font-weight: bold; color: #38bdf8; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
 input[type="password"] { width: 80%; padding: 12px 15px; background: #020617; border: 1px solid #334155; border-radius: 6px; color: #00ffcc; font-family: monospace; font-size: 1.1em; text-align: center; outline: none; margin-bottom: 20px; }
 .btn-submit { background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
 .error-msg { color: #ff3366; margin-top: 15px; font-weight: bold; display: none; }
 
 #book-viewer-zone { display: none; width: 100vw; height: 100vh; background-color: #020617; position: fixed; top: 0; left: 0; z-index: 9999; flex-direction: column; }
 .viewer-header { height: 65px; background: #020617; border-bottom: 1px solid #334155; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px 20px; box-sizing: border-box; gap: 4px; }
 .header-controls { width: 100%; display: flex; align-items: center; justify-content: space-between; }
 .slider-container { width: 100%; display: flex; align-items: center; }
 .page-slider { width: 100%; -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 3px; outline: none; }
 .page-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer; }
 .nav-input-box { display: flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #334155; padding: 2px 6px; border-radius: 4px; }
 #pdf-canvas-container { flex: 1; width: 100vw; display: flex; justify-content: center; align-items: center; background-color: #0f172a; position: relative; overflow: hidden; }
 canvas { box-shadow: 0 4px 30px rgba(0,0,0,0.7); max-width: 100%; max-height: 100%; object-fit: contain; }
 .touch-zone { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 10; }
 .zone-left { left: 0; }
 .zone-right { right: 0; }
 </style>
</head>
<body>

 <div class="lock-container" id="lock-screen">
  <div class="neon-title">🔒 REDOKS JURIŠ<br><span style="font-size: 0.7em; color: #cbd5e1;">Zvanični PDF.js Čitač</span></div>
  <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
  <br>
  <button class="btn-submit" onclick="verifyRedoxVault()">Pristupi</button>
  <div class="error-msg" id="error-box">🛑 KOD NIJE ISPRAVAN!</div>
 </div>

 <div id="book-viewer-zone">
  <div class="viewer-header">
   <div class="header-controls">
    <span style="color: #38bdf8; font-weight: bold; font-size: 12px;">📖 REDOKS JURIŠ</span>
    <div class="nav-input-box">
     <span id="current-page-text" style="color: #00ffcc; font-weight: bold; font-size: 12px;">1</span>
     <span id="total-pages-text" style="color: #64748b; font-size: 12px;">/ --</span>
    </div>
   </div>
   <div class="slider-container">
    <input type="range" id="page-slider" class="page-slider" min="1" max="1" value="1" oninput="onSliderMove(this.value)">
   </div>
  </div>
  <div id="pdf-canvas-container">
   <div class="touch-zone zone-left" onclick="prethodnaStrana()"></div>
   <canvas id="pdf-rendering-canvas"></canvas>
   <div class="touch-zone zone-right" onclick="sledećaStrana()"></div>
  </div>
 </div>

 <script>
 pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';
 var pdfDoc = null, trenutnaStrana = 1, canvas = document.getElementById('pdf-rendering-canvas'), ctx = canvas.getContext('2d'), pageRendering = false;
 
 // AKTUALIZOVANO: Pozivamo novu, očišćenu i verifikovanu datoteku
 var putanjaDoKnjige = "./Knjiga2.pdf"; 

 function verifyRedoxVault() {
  var inputPass = document.getElementById("redox-pass").value.trim();
  if (inputPass === "REDOX2026") {
   document.getElementById("lock-screen").style.display = "none";
   document.getElementById("book-viewer-zone").style.display = "flex";
   ucitajPdfDokument();
  } else { document.getElementById("error-box").style.display = "block"; }
 }

 function ucitajPdfDokument() {
  pdfjsLib.getDocument(putanjaDoKnjige).promise.then(function(pdfDoc_) {
   pdfDoc = pdfDoc_;
   document.getElementById('total-pages-text').innerText = "/ " + pdfDoc.numPages;
   document.getElementById('page-slider').max = pdfDoc.numPages;
   renderujStranicu(trenutnaStrana);
   setupSwipeGestures();
  }).catch(function(error) { alert("Greška: Sistem ne pronalazi datoteku Knjiga2.pdf."); });
 }

 function renderujStranicu(brojStrane) {
  if (pageRendering) return;
  pageRendering = true;
  pdfDoc.getPage(brojStrane).then(function(page) {
   var viewport = page.getViewport({ scale: 1.0 });
   var targetWidth = window.innerWidth;
   var scale = (targetWidth / viewport.width) * 1.5; 
   var optimalViewport = page.getViewport({ scale: scale });
   canvas.height = optimalViewport.height;
   canvas.width = optimalViewport.width;
   var renderContext = { canvasContext: ctx, viewport: optimalViewport };
   page.render(renderContext).promise.then(function() { pageRendering = false; });
  });
  document.getElementById('current-page-text').innerText = brojStrane;
  document.getElementById('page-slider').value = brojStrane;
 }

 function prethodnaStrana() { if (trenutnaStrana <= 1 || pageRendering) return; trenutnaStrana--; renderujStranicu(trenutnaStrana); }
 function sledećaStrana() { if (trenutnaStrana >= pdfDoc.numPages || pageRendering) return; trenutnaStrana++; renderujStranicu(trenutnaStrana); }
 function onSliderMove(vrednost) { var novaStrana = parseInt(vrednost); if(novaStrana !== trenutnaStrana && !pageRendering) { trenutnaStrana = novaStrana; renderujStranicu(trenutnaStrana); } }
 function setupSwipeGestures() {
  let touchstartX = 0, touchendX = 0; const zona = document.getElementById('pdf-canvas-container');
  zona.addEventListener('touchstart', e => { touchstartX = e.changedTouches.screenX; }, { passive: true });
  zona.addEventListener('touchend', e => { touchendX = e.changedTouches.screenX; handleSwipe(); }, { passive: true });
  function handleSwipe() { const granica = 40; if (touchstartX - touchendX > granica) sledećaStrana(); if (touchendX - touchstartX > granica) prethodnaStrana(); }
 }
 document.getElementById("redox-pass").addEventListener("keyup", function(event) { if (event.key === "Enter") verifyRedoxVault(); });
 </script>
</body>
</html>
