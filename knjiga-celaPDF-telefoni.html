<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
 <title>REDOKS JURIŠ</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: monospace; background: #020617; color: #cbd5e1; text-align: center; min-height: 100vh; overflow: hidden; }
 .lock-container { background: #0f172a; border: 2px solid #334155; border-top: 6px solid #38bdf8; padding: 40px 30px; border-radius: 12px; max-width: 400px; width: 90%; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }
 input { width: 80%; padding: 12px; background: #020617; border: 1px solid #334155; color: #00ffcc; text-align: center; margin-bottom: 20px; outline: none; font-size: 1.1em; }
 button { padding: 12px 30px; background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; color: #00ffcc; font-weight: bold; cursor: pointer; text-transform: uppercase; }
 #book-viewer-zone { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 9999; flex-direction: column; background: #020617; }
 .viewer-header { height: 60px; background: #020617; border-bottom: 1px solid #334155; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px 20px; gap: 4px; width: 100%; }
 .slider-container { width: 100%; max-width: 500px; display: flex; align-items: center; }
 .page-slider { width: 100%; -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 3px; outline: none; }
 .page-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #38bdf8; cursor: pointer; }
 #book-container { flex: 1; width: 100%; background: #0f172a; position: relative; display: flex; justify-content: center; align-items: center; overflow: auto; touch-action: pan-y; }
 .book-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
 .book-page-img { box-shadow: 0 4px 25px rgba(0,0,0,0.8); background: #ffffff; display: block; }
 .text-click-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 998; }
 .t-left { left: 0; } .t-right { left: 50%; }
 @media (min-width: 769px) { .book-page-img { width: auto; height: calc(100vh - 80px); max-width: 48%; object-fit: contain; } }
 @media (max-width: 768px) { #book-viewer-zone { max-width: 100vw; } .book-wrapper { width: 100vw; height: calc(100vh - 60px); } .book-page-img { width: 100%; height: 100%; object-fit: contain; } #book-page-right { display: none !important; } }
 @media (max-width: 900px) and (orientation: landscape) { .viewer-header { height: 38px; gap: 2px; } .page-slider { height: 4px; } .page-slider::-webkit-slider-thumb { width: 14px; height: 14px; } .book-page-img { height: calc(100vh - 38px); } }
 </style>
</head>
<body oncontextmenu="return false;">

 <div class="lock-container" id="lock-screen">
 <h2 style="color: #38bdf8; margin-bottom: 20px;">🔒 REDOKS JURIŠ</h2>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br>
 <button onclick="verifyRedoxVault()">Pristupi</button>
 </div>

 <div id="book-viewer-zone">
 <div class="viewer-header">
  <div style="width: 100%; max-width: 500px; display: flex; justify-content: space-between; font-size: 11px; color: #38bdf8; font-weight: bold;">
   <span>★ DRAGAN LOBODA - REDOKS JURIŠ</span>
   <div>Strana: <span id="cur-txt" style="color: #00ffcc;">1</span><span id="tot-txt" style="color: #64748b;">/ --</span></div>
  </div>
  <div class="slider-container"><input type="range" id="page-slider" class="page-slider" min="1" max="275" value="1"></div>
 </div>
 <div id="book-container">
  <div class="book-wrapper">
    <div class="text-click-zone t-left" onclick="okreniLevo()"></div>
    <img id="book-page-left" class="book-page-img" src="" alt="Leva">
    <img id="book-page-right" class="book-page-img" src="" alt="Desna">
    <div class="text-click-zone t-right" onclick="okreniDesno()"></div>
  </div>
 </div>
 </div>

 <script>
 var TOTAL = 275, sveStranice = [], scale = 1, indeks = 0, startX = 0;
 var imgL = document.getElementById('book-page-left'), imgD = document.getElementById('book-page-right'), slider = document.getElementById('page-slider');

 for (var i = 1; i <= TOTAL; i++) {
     var num = i < 10 ? "00" + i : (i < 100 ? "0" + i : i);
     sveStranice.push("./slike/knjiga2-" + num + ".jpg");
 }

 function verifyRedoxVault() {
  if (document.getElementById("redox-pass").value.trim() === "REDOX2026") {
   document.getElementById("lock-screen").style.display = "none";
   document.getElementById("book-viewer-zone").style.display = "flex";
   slider.max = TOTAL; prikazi(0); pokreni();
  } else { alert("🛑 ŠIFRA NIJE ISPRAVAN!"); }
 }

 function prikazi(idx) {
  indeks = idx; var mob = window.innerWidth <= 768;
  imgL.src = sveStranice[Math.max(0, Math.min(TOTAL - 1, idx))];
  if (mob) {
    document.getElementById('cur-txt').innerText = idx + 1;
    document.getElementById('tot-txt').innerText = "/ " + TOTAL;
  } else {
    if (idx + 1 < TOTAL) {
      imgD.style.display = "block"; imgD.src = sveStranice[idx + 1];
      document.getElementById('cur-txt').innerText = (idx + 1) + "-" + (idx + 2);
    } else { imgD.style.display = "none"; document.getElementById('cur-txt').innerText = idx + 1; }
    document.getElementById('tot-txt').innerText = "/ " + TOTAL;
  }
  slider.value = idx + 1; scale = 1; imgL.style.transform = "scale(1)"; if(!mob) imgD.style.transform = "scale(1)";
 }

 function pokreni() {
  slider.addEventListener('mousedown', klikTraka); slider.addEventListener('touchstart', klikTraka);
  function klikTraka(e) {
    var rect = slider.getBoundingClientRect(), cx = e.clientX || (e.touches && e.touches[0].clientX);
    if(!cx) return; var cilj = Math.round(((cx - rect.left) / rect.width) * TOTAL);
    if (Math.abs(cilj - (indeks + 1)) > 5) { if (cilj > indeks + 1) { okreniDesno(); } else { okreniLevo(); } e.preventDefault(); }
  }
  slider.addEventListener('input', function() { prikazi(parseInt(slider.value) - 1); });
  document.getElementById('book-container').addEventListener('wheel', function(e) {
    e.preventDefault(); scale += e.deltaY < 0 ? 0.08 : -0.08; scale = Math.max(0.8, Math.min(4, scale));
    imgL.style.transform = `scale(${scale})`; if(window.innerWidth > 768) imgD.style.transform = `scale(${scale})`;
  });
  document.getElementById('book-container').addEventListener('touchstart', e => { if(e.touches.length===1) startX = e.touches[0].clientX; }, {passive:true});
  document.getElementById('book-container').addEventListener('touchend', e => {
    if(e.changedTouches.length===1) {
      var diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 40) { if(diff < 0) { okreniDesno(); } else { okreniLevo(); } }
    }
  }, {passive:true});
 }

 function okreniLevo() { var k = window.innerWidth <= 768 ? 1 : 2; if (indeks > 0) prikazi(Math.max(0, indeks - k)); }
 function okreniDesno() { var k = window.innerWidth <= 768 ? 1 : 2; if (indeks < TOTAL - k) prikazi(indeks + k); }
 window.addEventListener('resize', function() { prikazi(indeks); });
 document.addEventListener('keydown', e => { if (e.key === "ArrowRight") okreniDesno(); if (e.key === "ArrowLeft") okreniLevo(); });
 document.getElementById("redox-pass").addEventListener("keyup", function(e) { if (e.key === "Enter") verifyRedoxVault(); });
 </script>
</body>
</html>
html
