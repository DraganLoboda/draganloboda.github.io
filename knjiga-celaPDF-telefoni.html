<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REDOKS JURIŠ - Stable Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#020617;color:#cbd5e1;overflow:hidden}

.lock{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#0f172a;padding:30px;border-radius:12px;border:2px solid #334155;
text-align:center;width:90%;max-width:420px;z-index:10
}
input{width:80%;padding:12px;background:#020617;color:#00ffcc;border:1px solid #334155;text-align:center}
button{margin-top:15px;padding:10px 25px;background:transparent;border:1px solid #00ffcc;color:#00ffcc}

.viewer{display:none;flex-direction:column;height:100vh;width:100vw;max-width:480px;margin:auto}
.header{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid #334155}
.slider{width:100%}
canvas{width:100%;height:100%;object-fit:contain}
.container{flex:1;display:flex;justify-content:center;align-items:center;position:relative;background:#0f172a}

.zone{position:absolute;top:0;bottom:0;width:30%;z-index:5}
.left{left:0}
.right{right:0}
</style>
</head>

<body>

<div class="lock" id="lock">
<div style="color:#38bdf8;margin-bottom:15px">🔒 REDOKS JURIŠ</div>
<input id="pass" type="password" placeholder="ŠIFRA">
<br>
<button onclick="check()">ULAZ</button>
</div>

<div class="viewer" id="viewer">

<div class="header">
<span>📖 KNJIGA</span>
<span id="pageInfo">1/1</span>
</div>

<input class="slider" type="range" id="slider" min="1" value="1" oninput="go(this.value)">

<div class="container">
<div class="zone left" onclick="prev()"></div>
<canvas id="c"></canvas>
<div class="zone right" onclick="next()"></div>
</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url = "./Knjiga2.pdf";

let pdf=null,page=1,rendering=false;
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function check(){
if(document.getElementById("pass").value==="REDOX2026"){
document.getElementById("lock").style.display="none";
document.getElementById("viewer").style.display="flex";
load();
}
}

function load(){
pdfjsLib.getDocument(url).promise.then(p=>{
pdf=p;
document.getElementById("slider").max=pdf.numPages;
render(page);
});
}

function render(n){
if(rendering)return;
rendering=true;

pdf.getPage(n).then(p=>{
const w=window.innerWidth>480?480:window.innerWidth;
const v=p.getViewport({scale:1});
const s=w/v.width*1.4;
const vp=p.getViewport({scale:s});

canvas.width=vp.width;
canvas.height=vp.height;

p.render({canvasContext:ctx,viewport:vp}).promise.then(()=>{
rendering=false;
});

document.getElementById("pageInfo").innerText=n+"/"+pdf.numPages;
document.getElementById("slider").value=n;
});
}

function next(){if(page<pdf.numPages){page++;render(page)}}
function prev(){if(page>1){page--;render(page)}}
function go(v){page=parseInt(v);render(page)}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")next();
if(e.key==="ArrowLeft")prev();
});
</script>

</body>
</html>
