<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>REDOKS JURIŠ (Zvanični PDF.js Mobilni Čitač) - Protokol Loboda</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: monospace;
            background-color: #020617;
            color: #cbd5e1;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .lock-container {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            border: 2px solid #334155;
            border-top: 6px solid #00ffcc;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
        }
        .neon-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px 15px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #00ffcc;
            font-family: monospace;
            font-size: 1.1em;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }
        input[type="password"]:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        .btn-submit {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 12px 30px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background: #00ffcc;
            color: #020617;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .error-msg {
            color: #ff3366;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
        #book-viewer-zone {
            display: none;
            width: 100vw;
            height: 100vh;
            background-color: #020617;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
        .viewer-header {
            height: 50px;
            background: #020617;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .nav-input-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 3px 6px;
            border-radius: 4px;
        }
        .page-num-input {
            width: 45px;
            background: #020617;
            border: 1px solid #475569;
            color: #00ffcc;
            text-align: center;
            font-family: monospace;
            font-size: 13px;
            border-radius: 3px;
            padding: 2px;
            outline: none;
        }
        .btn-go {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
        }
        .btn-go:hover { background: #00ffcc; color: #020617; }
        
        #pdf-canvas-container {
            width: 100%;
            height: calc(100vh - 50px);
            overflow-y: auto;
            overflow-x: hidden;
            text-align: center;
            background-color: #0f172a;
            padding: 15px 0;
            box-sizing: border-box;
        }
        canvas {
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            max-width: 98%;
            height: auto !important;
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="lock-container" id="lock-screen">
        <div class="neon-title"><span style="font-size: 0.7em; color: #94a3b8; display: block; margin-bottom: 5px;">📱 ZA TELEFONE</span>🔒 REDOKS JURIŠ<br><span style="font-size: 0.8em; color: #cbd5e1;">Cela knjiga PDF</span></div>
        <p style="font-size: 0.9em; line-height: 1.6; margin-bottom: 25px; color: #94a3b8;">Unesite vašu tridesetodnevnu autorizovanu šifru za pristup originalnom PDF rukopisu.</p>
        
        <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
        <br>
        <button class="btn-submit" onclick="verifyRedoxVault()">Pristupi</button>
        <div class="error-msg" id="error-box">🛑 KOD NIJE ISPRAVAN! PROVERITE RESURSE.</div>
    </div>

    <div id="book-viewer-zone">
        <div class="viewer-header">
            <span style="color: #00ffcc; font-weight: bold; font-family: monospace; font-size: 12px;">[ZA TELEFONE] 📖 Dragan Loboda - REDOKS JURIŠ (Original PDF)</span>
            
            <div class="nav-input-box">
                <span style="font-size: 11px; color: #94a3b8;">Strana:</span>
                <input type="number" id="target-page-input" class="page-num-input" min="1" value="1">
                <span id="total-pages-text" style="font-size: 11px; color: #64748b;">/ --</span>
                <button class="btn-go" onclick="skociNaStranicu()">Idi</button>
            </div>
        </div>
        
        <div id="pdf-canvas-container"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

        var pdfDoc = null;
        var putanjaDoKnjige = "./KnjigaRedoksJuriš.pdf"; 
        var kontejner = document.getElementById('pdf-canvas-container');

        function verifyRedoxVault() {
            var inputPass = document.getElementById("redox-pass").value;
            var errorBox = document.getElementById("error-box");

            if (inputPass === "REDOX2026") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("book-viewer-zone").style.display = "block";
                errorBox.style.display = "none";
                document.getElementById("redox-pass").value = "";
                
                ucitajPdfDokument();
            } else {
                errorBox.style.display = "block";
            }
        }

        function ucitajPdfDokument() {
            pdfjsLib.getDocument(putanjaDoKnjige).promise.then(function(pdfDoc_) {
                pdfDoc = pdfDoc_;
                document.getElementById('total-pages-text').innerText = "/ " + pdfDoc.numPages;
                document.getElementById('target-page-input').max = pdfDoc.numPages;
                
                for (var i = 1; i <= pdfDoc.numPages; i++) {
                    napraviPlatnoZaStranicu(i);
                }
            });
        }

        function napraviPlatnoZaStranicu(brojStrane) {
            var canvas = document.createElement('canvas');
            canvas.id = 'pdf-strana-' + brojStrane;
            kontejner.appendChild(canvas);
            
            pdfDoc.getPage(brojStrane).then(function(page) {
                var ctx = canvas.getContext('2d');
                var viewport = page.getViewport({ scale: window.devicePixelRatio > 1 ? 1.6 : 1.2 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                var renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderContext);
            });
        }

        function skociNaStranicu() {
            var brStrane = parseInt(document.getElementById("target-page-input").value);
            if (!brStrane || brStrane < 1) brStrane = 1;
            if (brStrane > pdfDoc.numPages) brStrane = pdfDoc.numPages;
            
            var metaElement = document.getElementById('pdf-strana-' + brStrane);
            if (metaElement) {
                metaElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        window.addEventListener('keydown', function (e) {
            if (
                (e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u') || 
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I')
            ) {
                e.preventDefault();
                alert("🛑 KÔD JE ZAŠTIĆEN: Strukturirani oklop ne dozvoljava preuzimanje elemenata.");
            }
        });
    </script>
</body>
</html>
