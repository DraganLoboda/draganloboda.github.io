<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>REDOKS JURIŠ - Protokol Loboda</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
  font-family: monospace; background-color: #020617; color: #cbd5e1;
  overflow: hidden; user-select: none; -webkit-user-select: none;
 }
 .lock-container {
  background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
  border: 2px solid #334155; border-top: 6px solid #38bdf8;
  padding: 40px 30px; border-radius: 12px; text-align: center;
  max-width: 450px; width: 90%; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 10000;
 }
 input[type="password"] {
  width: 80%; padding: 12px 15px; background: #020617; border: 1px solid #334155;
  border-radius: 6px; color: #00ffcc; font-family: monospace; font-size: 1.1em;
  text-align: center; outline: none; margin-bottom: 20px;
 }
 .btn-submit {
  background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc;
  padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase;
 }
 .error-msg { color: #ff3366; margin-top: 15px; font-weight: bold; display: none; }
 
 /* Mobilni okvir čitača */
 #book-viewer-zone {
  display: none; width: 100vw; height: 100vh;
  max-width: 480px; background-color: #020617;
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  z-index: 9999; flex-direction: column;
 }
 .viewer-header {
  height: 60px; background: #020617; border-bottom: 1px solid #334155;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 5px 15px; gap: 4px;
 }
 .slider-container { width: 100%; display: flex; align-items: center; }
 .page-slider {
  width: 100%; -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 3px; outline: none;
 }
 .page-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer;
 }
 
 /* Zona horizontalnog prikaza */
 #pdf-frame-container { flex: 1; width: 100%; background-color: #0f172a; position: relative; }
 iframe { width: 100%; height: 100%; border: none; }
 .touch-navigator { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 999; cursor: pointer; }
 .nav-left { left: 0; }
 .nav-right { right: 0; }
 </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

 <!-- KAPIJA ZA ŠIFRU -->
 <div class="lock-container" id="lock-screen">
 <div style="font-size: 1.3em; font-weight: bold; color: #38bdf8; letter-spacing: 2px; margin-bottom: 25px;">🔒 REDOKS JURIŠ</div>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br>
 <button class="btn-submit" onclick="verifyRedoxVault()">Pristupi</button>
 <div class="error-msg" id="error-box">🛑 KOD NIJE ISPRAVAN!</div>
 </div>

 <!-- JEDNOSTRANI HORIZONTALNI MOBILNI ČITAČ -->
 <div id="book-viewer-zone">
 <div class="viewer-header">
  <div style="width: 100%; display: flex; justify-content: space-between; font-size: 12px; color: #38bdf8;">
   <span>📖 REDOKS JURIŠ</span>
   <span id="page-indicator">Pozicija: 1%</span>
  </div>
  <div class="slider-container">
   <input type="range" id="page-slider" class="page-slider" min="1" max="100" value="1" oninput="onSliderMove(this.value)">
  </div>
 </div>
 
 <div id="pdf-frame-container">
  <!-- Brze nevidljive zone za horizontalni skok na dodir levo-desno -->
  <div class="touch-navigator nav-left" onclick="okreniNazad()"></div>
  <iframe id="secure-pdf-frame" src=""></iframe>
  <div class="touch-navigator nav-right" onclick="okreniNapred()"></div>
 </div>
 </div>

 <script>
 // Pozivamo vaš verifikovani lokalni fajl iz fascikle koji niko ne može da preusmeri
 var putanjaDoKnjige = "./Knjiga2.pdf"; 
 var mojIframe = document.getElementById('secure-pdf-frame');
 var mojSlider = document.getElementById('page-slider');

 function verifyRedoxVault() {
  var inputPass = document.getElementById("redox-pass").value.trim();
  if (inputPass === "REDOX2026") {
   document.getElementById("lock-screen").style.display = "none";
   document.getElementById("book-viewer-zone").style.display = "flex";
   
   // Fiksiramo jednostrani horizontalni prikaz preko unutrašnjih PDF parametara ekrana (#page=1)
   mojIframe.src = putanjaDoKnjige + "#page=1&zoom=page-fit&toolbar=0&navpanes=0&scrollbar=0";
   setupSwipeGestures();
  } else {
   document.getElementById("error-box").style.display = "block";
  }
 }

 function onSliderMove(vrednost) {
  document.getElementById('page-indicator').innerText = "Pozicija: " + vrednost + "%";
  // Izračunavanje i skok na tačnu horizontalnu stranicu
  mojIframe.src = putanjaDoKnjige + "#page=" + Math.ceil(vrednost) + "&zoom=page-fit&toolbar=0&navpanes=0";
 }

 function okreniNazad() {
  var trenutnaVrednost = parseInt(mojSlider.value);
  if (trenutnaVrednost > 1) {
   mojSlider.value = trenutnaVrednost - 4;
   onSliderMove(mojSlider.value);
  }
 }

 function okreniNapred() {
  var trenutnaVrednost = parseInt(mojSlider.value);
  if (trenutnaVrednost < 100) {
   mojSlider.value = trenchesVrednost + 4;
   onSliderMove(mojSlider.value);
  }
 }

 function setupSwipeGestures() {
  let startX = 0;
  document.getElementById('pdf-frame-container').addEventListener('touchstart', e => { startX = e.changedTouches.screenX; }, {passive: true});
  document.getElementById('pdf-frame-container').addEventListener('touchend', e => {
   let endX = e.changedTouches.screenX;
   if (startX - endX > 40) okreniNapred(); // Prevlačenje prsta udesno -> sledeća strana
   if (endX - startX > 40) okreniNazad(); // Prevlačenje prsta ulevo -> prethodna strana
  }, {passive: true});
 }

 document.getElementById("redox-pass").addEventListener("keyup", function(event) {
  if (event.key === "Enter") verifyRedoxVault();
 });
 </script>
</body>
</html>
