<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDOKS JURIŠ - Mobilni PDF.js Čitač</title>

<style>
body{
    margin:0;
    background:#020617;
    color:#cbd5e1;
    font-family:monospace;
}

#lock-screen{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#020617;
}

.lock-box{
    width:90%;
    max-width:420px;
    text-align:center;
    padding:30px;
    border:2px solid #334155;
    border-top:6px solid #00ffcc;
    border-radius:12px;
}

input[type=password]{
    width:90%;
    padding:12px;
    background:#0f172a;
    color:#00ffcc;
    border:1px solid #334155;
    border-radius:6px;
}

button{
    cursor:pointer;
}

#reader{
    display:none;
    height:100vh;
    overflow:hidden;
}

#toolbar{
    height:60px;
    background:#0f172a;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px;
}

.nav-btn{
    background:#00ffcc;
    border:none;
    padding:8px 12px;
    font-weight:bold;
}

#pageNumber{
    width:60px;
    text-align:center;
}

#pageSlider{
    flex:1;
}

#viewer{
    height:calc(100vh - 60px);
    overflow:auto;
    text-align:center;
}

canvas{
    max-width:100%;
    height:auto;
}
</style>
</head>

<body>

<div id="lock-screen">

<div class="lock-box">

<h2>🔒 REDOKS JURIŠ</h2>

<input
type="password"
id="redox-pass"
placeholder="UNESITE ŠIFRU">

<br><br>

<button onclick="verifyRedoxVault()">
Pristupi
</button>

<div id="error-box" style="display:none;color:red;margin-top:10px;">
Pogrešna šifra
</div>

</div>
</div>

<div id="reader">

<div id="toolbar">

<button class="nav-btn" id="prev">
◀
</button>

<input
type="number"
id="pageNumber"
value="1">

<span id="pageCount">
/ ?
</span>

<button class="nav-btn" id="next">
▶
</button>

<input
type="range"
id="pageSlider"
min="1"
max="1"
value="1">

</div>

<div id="viewer">

<canvas id="pdf-canvas"></canvas>

</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js';

let pdfDoc = null;
let pageNum = 1;
let pageRendering = false;
let pageNumPending = null;
let scale = 1.4;

const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');

function verifyRedoxVault() {

    const inputPass =
        document.getElementById('redox-pass').value;

    const errorBox =
        document.getElementById('error-box');

    if (inputPass === "REDOX2026") {

        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('reader').style.display = 'block';

        errorBox.style.display = 'none';
alert("Sifra je prihvacena");
        loadPDF();

    } else {

        errorBox.style.display = 'block';
    }
}

async function loadPDF() {
    alert("loadPDF pokrenut");
console.log("Pokusavam da ucitam PDF...");
    const loadingTask =
    pdfjsLib.getDocument('KnjigaRedoksJuriš.pdf');

    try {

    pdfDoc = await loadingTask.promise;

    alert("PDF UCITAN");

} catch(err) {

    alert("GRESKA: " + err.message);

    console.log(err);

    return;
}

    document.getElementById('pageCount').textContent =
        '/ ' + pdfDoc.numPages;

    document.getElementById('pageSlider').max =
        pdfDoc.numPages;

    const savedPage =
        parseInt(localStorage.getItem('redoks_last_page'));

    if (
        savedPage &&
        savedPage >= 1 &&
        savedPage <= pdfDoc.numPages
    ) {
        pageNum = savedPage;
    }

    renderPage(pageNum);
}

function renderPage(num) {

    pageRendering = true;

    pdfDoc.getPage(num).then(function(page) {

        const viewport =
            page.getViewport({ scale: scale });

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };

        const renderTask =
            page.render(renderContext);

        renderTask.promise.then(function() {

            pageRendering = false;

            if (pageNumPending !== null) {

                renderPage(pageNumPending);
                pageNumPending = null;
            }
        });

    });

    document.getElementById('pageNumber').value =
        num;

    document.getElementById('pageSlider').value =
        num;

    localStorage.setItem(
        'redoks_last_page',
        num
    );
}

function queueRenderPage(num) {

    if (pageRendering) {

        pageNumPending = num;

    } else {

        renderPage(num);
    }
}

function previousPage() {

    if (pageNum <= 1) return;

    pageNum--;

    queueRenderPage(pageNum);
}

function nextPage() {

    if (pageNum >= pdfDoc.numPages) return;

    pageNum++;

    queueRenderPage(pageNum);
}

document
.getElementById('prev')
.addEventListener('click', previousPage);

document
.getElementById('next')
.addEventListener('click', nextPage);

document
.getElementById('pageNumber')
.addEventListener('change', function() {

    let val = parseInt(this.value);

    if (!val) return;

    if (val < 1) val = 1;

    if (val > pdfDoc.numPages)
        val = pdfDoc.numPages;

    pageNum = val;

    queueRenderPage(pageNum);
});

document
.getElementById('pageSlider')
.addEventListener('input', function() {

    pageNum = parseInt(this.value);

    queueRenderPage(pageNum);
});

document.addEventListener('keydown', function(e){

    if(e.key === 'ArrowLeft')
        previousPage();

    if(e.key === 'ArrowRight')
        nextPage();
});

</script>

</body>
</html>
