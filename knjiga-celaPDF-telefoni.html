<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDOKS JURIŠ - Mobilni PDF.js Čitač</title>
<style>
body{
 margin:0;
 background:#020617;
 color:#cbd5e1;
 font-family:monospace;
}
#lock-screen{
 position:fixed;
 inset:0;
 display:flex;
 align-items:center;
 justify-content:center;
 background:#020617;
 z-index: 10000;
}
.lock-box{
 width:90%;
 max-width:420px;
 text-align:center;
 padding:30px;
 border:2px solid #334155;
 border-top:6px solid #00ffcc;
 border-radius:12px;
}
input[type=password]{
 width:90%;
 padding:12px;
 background:#0f172a;
 color:#00ffcc;
 border:1px solid #334155;
 border-radius:6px;
 text-align: center;
 font-family: monospace;
 font-size: 1.1em;
 outline: none;
 margin-bottom: 15px;
}
button{
 background: rgba(0, 255, 204, 0.1);
 border: 1px solid #00ffcc;
 color: #00ffcc;
 padding: 12px 30px;
 font-family: monospace;
 font-weight: bold;
 text-transform: uppercase;
 border-radius: 6px;
 cursor:pointer;
}
button:hover {
 background: #00ffcc;
 color: #020617;
}
#reader{
 display:none;
 height:100vh;
 overflow:hidden;
}
#toolbar{
 height:60px;
 background:#0f172a;
 border-bottom: 1px solid #334155;
 display:flex;
 align-items:center;
 gap:8px;
 padding:8px;
 box-sizing: border-box;
}
.nav-btn{
 background:#00ffcc;
 border:none;
 padding:8px 14px;
 font-weight:bold;
 border-radius: 4px;
 color: #020617;
}
#pageNumber{
 width:50px;
 text-align:center;
 background: #020617;
 border: 1px solid #334155;
 color: #00ffcc;
 padding: 6px;
 border-radius: 4px;
 font-family: monospace;
}
#pageSlider{
 flex:1;
 accent-color: #00ffcc;
}
#viewer{
 height:calc(100vh - 60px);
 overflow:auto;
 text-align:center;
 background: #0f172a;
 padding: 15px 0;
 box-sizing: border-box;
}
canvas{
 max-width:98%;
 height:auto;
 box-shadow: 0 4px 25px rgba(0,0,0,0.6);
 margin-bottom: 15px;
}
</style>
</head>
<body>

<div id="lock-screen">
<div class="lock-box">
 <h2>🔒 REDOKS JURIŠ</h2>
 <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Unesite šifru za pristup originalnom PDF.js čitaču za telefone.</p>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br><br>
 <button onclick="verifyRedoxVault()">Pristupi</button>
 <div id="error-box" style="display:none;color:#ff3366;margin-top:15px;font-weight:bold;">
 🛑 KOD NIJE ISPRAVAN!
 </div>
</div>
</div>

<div id="reader">
<div id="toolbar">
 <button class="nav-btn" id="prev">◀</button>
 <input type="number" id="pageNumber" value="1">
 <span id="pageCount" style="font-size: 13px; color: #94a3b8; margin-right: 5px;">/ ?</span>
 <button class="nav-btn" id="next">▶</button>
 <input type="range" id="pageSlider" min="1" max="1" value="1">
</div>
<div id="viewer">
 <canvas id="pdf-canvas"></canvas>
</div>
</div>

<!-- STABILNI STARIJI RENDER KOJI RADI DIREKTNO UNUTAR JEDNOG FAJLA BEZ REUSMERAVANJA -->
<script src="https://cloudflare.com"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

let pdfDoc = null;
let pageNum = 1;
let pageRendering = false;
let pageNumPending = null;
let scale = window.devicePixelRatio > 1 ? 1.5 : 1.2;
const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');

function verifyRedoxVault() {
 const inputPass = document.getElementById('redox-pass').value;
 const errorBox = document.getElementById('error-box');
 if (inputPass === "REDOX2026") {
 document.getElementById('lock-screen').style.display = 'none';
 document.getElementById('reader').style.display = 'block';
 errorBox.style.display = 'none';
 loadPDF();
 } else {
 errorBox.style.display = 'block';
 }
}

function loadPDF() {
 // Čista, bezbedna lokalna putanja do vašeg preimenovanog fajla
 const putanjaKnjige = "./KnjigaRedoksJuriš.pdf";
 
 pdfjsLib.getDocument(putanjaKnjige).promise.then(function(pdfDoc_) {
 pdfDoc = pdfDoc_;
 document.getElementById('pageCount').textContent = '/ ' + pdfDoc.numPages;
 document.getElementById('pageSlider').max = pdfDoc.numPages;
 document.getElementById('pageNumber').max = pdfDoc.numPages;
 
 const savedPage = parseInt(localStorage.getItem('redoks_last_page'));
 if (savedPage && savedPage >= 1 && savedPage <= pdfDoc.numPages) {
 pageNum = savedPage;
 }
 renderPage(pageNum);
 }).catch(function(err) {
 alert("Greška pri učitavanju: " + err.message);
 });
}

function renderPage(num) {
 pageRendering = true;
 pdfDoc.getPage(num).then(function(page) {
 const viewport = page.getViewport({ scale: scale });
 canvas.height = viewport.height;
 canvas.width = viewport.width;
 const renderContext = {
 canvasContext: ctx,
 viewport: viewport
 };
 const renderTask = page.render(renderContext);
 renderTask.promise.then(function() {
 pageRendering = false;
 if (pageNumPending !== null) {
 renderPage(pageNumPending);
 pageNumPending = null;
 }
 });
 });
 document.getElementById('pageNumber').value = num;
 document.getElementById('pageSlider').value = num;
 localStorage.setItem('redoks_last_page', num);
}

function queueRenderPage(num) {
 if (pageRendering) {
 pageNumPending = num;
 } else {
 renderPage(num);
 }
}

function previousPage() {
 if (pageNum <= 1) return;
 pageNum--;
 queueRenderPage(pageNum);
}

function nextPage() {
 if (pageNum >= pdfDoc.numPages) return;
 pageNum++;
 queueRenderPage(pageNum);
}

document.getElementById('prev').addEventListener('click', previousPage);
document.getElementById('next').addEventListener('click', nextPage);

document.getElementById('pageNumber').addEventListener('change', function() {
 let val = parseInt(this.value);
 if (!val) return;
 if (val < 1) val = 1;
 if (val > pdfDoc.numPages) val = pdfDoc.numPages;
 pageNum = val;
 queueRenderPage(pageNum);
});

document.getElementById('pageSlider').addEventListener('input', function() {
 pageNum = parseInt(this.value);
 queueRenderPage(pageNum);
});

document.addEventListener('keydown', function(e){
 if(e.key === 'ArrowLeft') previousPage();
 if(e.key === 'ArrowRight') nextPage();
});
</script>
</body>
</html>
