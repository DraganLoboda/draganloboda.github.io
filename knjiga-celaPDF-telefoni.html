<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>REDOKS JURIŠ (Mobilni Čitač) - Protokol Loboda</title>
    <style>
        body {
            font-family: monospace;
            background-color: #020617;
            color: #cbd5e1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #book-viewer-zone {
            width: 100vw;
            height: 100vh;
            background-color: #020617;
            position: fixed;
            top: 0;
            left: 0;
        }
        .viewer-header {
            height: 50px;
            background: #020617;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .book-frame {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
            background-color: #0f172a;
        }
    </style>
</head>
<body>

    <!-- STABILAN AKADEMSKI ČITAČ KOJI SE VERIFIKUJE INSTANTNO -->
    <div id="book-viewer-zone">
        <div class="viewer-header">
            <span style="color: #00ffcc; font-weight: bold; font-family: monospace; font-size: 13px;">[ZA TELEFONE] 📖 Dragan Loboda - REDOKS JURIŠ (Original PDF)</span>
            <span style="color: #64748b; font-size: 11px; font-family: monospace;">Kontinualni skrol</span>
        </div>
        <!-- DIREKTNO UČITAVANJE FAJLA BEZ JAVASCRIPT BLOKADA -->
        <iframe class="book-frame" src="./KnjigaRedoksJuris.pdf" allowfullscreen></iframe>
    </div>

</body>
</html>
