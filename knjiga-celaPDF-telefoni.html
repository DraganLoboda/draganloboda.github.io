<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REDOKS JURIŠ - PRO Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#020617;color:#cbd5e1;overflow:hidden}

.lock{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#0f172a;padding:30px;border-radius:12px;border:2px solid #334155;
text-align:center;width:90%;max-width:420px;z-index:10
}
input,button{font-family:monospace}
input{
width:80%;padding:12px;background:#020617;color:#00ffcc;
border:1px solid #334155;text-align:center
}
button{
margin-top:15px;padding:10px 25px;background:transparent;
border:1px solid #00ffcc;color:#00ffcc
}

.viewer{
display:none;flex-direction:column;height:100vh;width:100vw;max-width:480px;margin:auto
}
.header{
height:60px;display:flex;align-items:center;justify-content:space-between;
padding:0 10px;border-bottom:1px solid #334155
}
.slider{width:100%}

.container{
flex:1;display:flex;justify-content:center;align-items:center;
position:relative;background:#0f172a;overflow:hidden
}

canvas{
touch-action:none;
}

.zone{position:absolute;top:0;bottom:0;width:20%;z-index:5}
.left{left:0}
.right{right:0}
</style>
</head>

<body>

<div class="lock" id="lock">
<div style="color:#38bdf8;margin-bottom:15px">🔒 REDOKS JURIŠ</div>
<input id="pass" type="password" placeholder="ŠIFRA">
<br>
<button onclick="check()">ULAZ</button>
</div>

<div class="viewer" id="viewer">

<div class="header">
<span>📖 KNJIGA</span>
<span id="info">1/1</span>
</div>

<input class="slider" type="range" id="slider" min="1" value="1" oninput="go(this.value)">

<div class="container" id="box">
<div class="zone left" onclick="prev()"></div>
<canvas id="c"></canvas>
<div class="zone right" onclick="next()"></div>
</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url="./Knjiga2.pdf";

let pdf=null,page=1,rendering=false,scale=1;
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let panX=0,panY=0,isDragging=false,lastX=0,lastY=0;

// PINCH ZOOM
let touchDist=0;

function check(){
if(document.getElementById("pass").value==="REDOX2026"){
document.getElementById("lock").style.display="none";
document.getElementById("viewer").style.display="flex";
load();
}
}

function load(){
pdfjsLib.getDocument(url).promise.then(p=>{
pdf=p;
document.getElementById("slider").max=pdf.numPages;
render(page);
});
}

function render(n){
if(rendering)return;
rendering=true;

pdf.getPage(n).then(p=>{
const baseWidth=window.innerWidth>480?480:window.innerWidth;
const vp=p.getViewport({scale:1});

scale=(baseWidth/vp.width)*1.6;

const view=p.getViewport({scale});

canvas.width=view.width;
canvas.height=view.height;

p.render({canvasContext:ctx,viewport:view}).promise.then(()=>{
rendering=false;
});

document.getElementById("info").innerText=n+"/"+pdf.numPages;
document.getElementById("slider").value=n;

resetPan();
});
}

function resetPan(){
panX=0;panY=0;
canvas.style.transform=`translate(0px,0px)`;
}

function applyPan(){
canvas.style.transform=`translate(${panX}px,${panY}px)`;
}

function next(){if(page<pdf.numPages){page++;render(page)}}
function prev(){if(page>1){page--;render(page)}}
function go(v){page=parseInt(v);render(page)}

// DRAG (finger move)
const box=document.getElementById("box");

box.addEventListener("touchstart",e=>{
if(e.touches.length===1){
isDragging=true;
lastX=e.touches[0].clientX;
lastY=e.touches[0].clientY;
}

if(e.touches.length===2){
touchDist=getDist(e.touches);
}
},{passive:false});

box.addEventListener("touchmove",e=>{
if(e.touches.length===1 && isDragging){
let dx=e.touches[0].clientX-lastX;
let dy=e.touches[0].clientY-lastY;

panX+=dx;
panY+=dy;

lastX=e.touches[0].clientX;
lastY=e.touches[0].clientY;

applyPan();
}

if(e.touches.length===2){
let newDist=getDist(e.touches);
let diff=newDist-touchDist;

scale+=diff*0.005;
scale=Math.max(0.8,Math.min(3,scale));

canvas.style.transform=`scale(${scale}) translate(${panX}px,${panY}px)`;

touchDist=newDist;
}
},{passive:false});

box.addEventListener("touchend",()=>{
isDragging=false;
});

function getDist(t){
return Math.hypot(
t[0].clientX-t[1].clientX,
t[0].clientY-t[1].clientY
);
}

// swipe zones
document.querySelector(".left").onclick=prev;
document.querySelector(".right").onclick=next;
</script>

</body>
</html>
