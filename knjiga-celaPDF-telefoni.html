<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
 <title>REDOKS JURIŠ - Protokol Loboda</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { 
  font-family: monospace; background-color: #020617; color: #cbd5e1; 
  text-align: center; min-height: 100vh;
 }
 
 /* Kapija za šifru */
 .lock-container { 
  background: #0f172a; border: 2px solid #334155; border-top: 6px solid #38bdf8;
  padding: 40px 30px; border-radius: 12px; max-width: 400px; width: 90%; 
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; 
 }
 input[type="password"] { width: 80%; padding: 12px; background: #020617; border: 1px solid #334155; color: #00ffcc; text-align: center; margin-bottom: 20px; outline: none; border-radius: 6px; }
 .btn-submit { padding: 12px 30px; background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
 .error-msg { color: #ff3366; margin-top: 15px; font-weight: bold; display: none; }
 
 /* Glavni prozor čitača */
 #book-viewer-zone { 
  display: none; width: 100vw; height: 100vh; 
  position: fixed; top: 0; left: 0; z-index: 9999; 
  flex-direction: column; background-color: #020617;
 }
 .viewer-header { 
  height: 60px; background: #020617; border-bottom: 1px solid #334155; 
  display: flex; flex-direction: column; justify-content: center; align-items: center; 
  padding: 5px 15px; gap: 4px; width: 100%; z-index: 10001;
 }
 .slider-container { width: 100%; max-width: 500px; display: flex; align-items: center; position: relative; }
 
 /* Brzi i odzivni klizač */
 .page-slider { 
  width: 100%; -webkit-appearance: none; background: #1e293b; height: 8px; border-radius: 4px; outline: none; 
 }
 .page-slider::-webkit-slider-thumb { 
  -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #38bdf8; cursor: pointer; 
  box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
 }
 
 /* Zona za knjigu */
 #book-container { 
  flex: 1; width: 100%; background-color: #0f172a; 
  position: relative; display: flex; justify-content: center; 
  align-items: center; overflow: auto;
 }
 
 .book-wrapper {
  position: relative;
  display: inline-block;
  max-width: 100%;
  max-height: 100%;
 }
 
 .book-page-img { 
  max-width: 100%; max-height: 100%; 
  object-fit: contain; box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
  background-color: #ffffff;
  display: block;
  transition: transform 0.05s linear;
  transform-origin: center center;
 }
 
 /* Unutrašnje klik-zone postavljene tačno na levu i desnu polovinu TEKSTA (Slike) */
 .text-click-zone {
  position: absolute; top: 0; bottom: 0; width: 50%; z-index: 999; cursor: pointer;
 }
 .t-left { left: 0; }
 .t-right { left: 50%; }

 /* Vertikalni položaj / Računar */
 @media (orientation: portrait) {
   #book-viewer-zone { max-width: 480px; left: 50%; transform: translateX(-50%); border-left: 1px solid #334155; border-right: 1px solid #334155; }
 }

 /* Vodoravan položaj (Širenje od ivice do ivice) */
 @media (orientation: landscape) {
   #book-viewer-zone { max-width: 100vw; left: 0; transform: none; border: none; }
   .book-page-img { width: 100vw; height: calc(100vh - 60px); object-fit: contain; }
 }
 </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

 <!-- KAPIJA ZA ŠIFRU -->
 <div class="lock-container" id="lock-screen">
 <h2 style="color: #38bdf8; margin-bottom: 20px; font-size: 1.2em;">🔒 REDOKS JURIŠ</h2>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br>
 <button class="btn-submit" onclick="verifyRedoxVault()">Pristupi</button>
 <div class="error-msg" id="error-box">🛑 KOD NIJE ISPRAVAN!</div>
 </div>

 <!-- GLAVNI INTERFEJS -->
 <div id="book-viewer-zone">
 <div class="viewer-header">
  <div style="width: 100%; max-width: 500px; display: flex; justify-content: space-between; font-size: 11px; color: #38bdf8; font-weight: bold;">
   <span>📖 DRAGAN LOBODA - REDOKS JURIŠ</span>
   <span id="page-indicator">Stranica: 1 / 275</span>
  </div>
  <div class="slider-container">
   <input type="range" id="page-slider" class="page-slider" min="1" max="275" value="1">
  </div>
 </div>
 
 <div id="book-container">
  <div class="book-wrapper">
    <!-- Klik-zone fiksirane tačno na polovine slike -->
    <div class="text-click-zone t-left" onclick="okreniLevo()"></div>
    <img id="book-page" class="book-page-img" src="" alt="Knjiga">
    <div class="text-click-zone t-right" onclick="okreniDesno()"></div>
  </div>
 </div>
 </div>

 <script>
 var UKUPAN_BROJ_STRANICA = 275; 
 var sveStranice = [];
 var trenutnaSkala = 1;

 // Automatsko formiranje niza na osnovu imena slika na vašem serveru
 for (var i = 1; i <= UKUPAN_BROJ_STRANICA; i++) {
     var formatiranBroj = i;
     if (i < 10) { formatiranBroj = "00" + i; } 
     else if (i < 100) { formatiranBroj = "0" + i; }
     sveStranice.push("./slike/knjiga2-" + formatiranBroj + ".jpg");
 }

 var trenutniIndeks = 0;
 var slikaObjekat = document.getElementById('book-page');
 var mojSlider = document.getElementById('page-slider');

 function verifyRedoxVault() {
  var inputPass = document.getElementById("redox-pass").value.trim();
  if (inputPass === "REDOX2026") {
   document.getElementById("lock-screen").style.display = "none";
   document.getElementById("book-viewer-zone").style.display = "flex";
   
   mojSlider.max = UKUPAN_BROJ_STRANICA;
   prikaziStranicu(0);
   inicijalizujFunkcijeČitača();
  } else {
   document.getElementById("error-box").style.display = "block";
  }
 }

 function prikaziStranicu(indeks) {
  trenutniIndeks = indeks;
  slikaObjekat.src = sveStranice[Math.max(0, Math.min(sveStranice.length - 1, indeks))];
  document.getElementById('page-indicator').innerText = "Stranica: " + (indeks + 1) + " / " + UKUPAN_BROJ_STRANICA;
  mojSlider.value = indeks + 1;
  
  // Resetovanje zuma pri okretanju nove stranice radi stabilnosti
  trenutnaSkala = 1;
  slikaObjekat.style.transform = "scale(1)";
 }

 function inicijalizujFunkcijeČitača() {
  // 1. KONTROLA KLIZAČA: Brzo povlačenje + precizan 1-klik skok levo/desno
  mojSlider.addEventListener('mousedown', obradiKlikKlizača);
  mojSlider.addEventListener('touchstart', obradiKlikKlizača, {passive: false});

  function obradiKlikKlizača(e) {
    var rect = mojSlider.getBoundingClientRect();
    var clientX = e.clientX || e.touches[0].clientX;
    var procenat = (clientX - rect.left) / rect.width;
    var cilj = Math.round(procenat * UKUPAN_BROJ_STRANICA);
    
    if (cilj > trenutniIndeks + 1) {
      okreniDesno();
      e.preventDefault();
    } else if (cilj < trenutniIndeks + 1) {
      okreniLevo();
      e.preventDefault();
    }
  }

  // Slanje komande za brzo, trenutno ažuriranje tokom pomeranja kuglice
  mojSlider.addEventListener('input', function() {
    prikaziStranicu(parseInt(mojSlider.value) - 1);
  });

  // 2. KONTROLA TOČKIĆA MIŠA (Uveličavanje i umanjivanje)
  document.getElementById('book-container').addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY < 0) {
      // Točkić unapred -> Uveličaj
      trenutnaSkala += 0.08;
    } else {
      // Točkić unazad -> Umanji
      trenutnaSkala -= 0.08;
    }
    trenutnaSkala = Math.max(0.8, Math.min(4, trenutnaSkala));
    slikaObjekat.style.transform = `scale(${trenutnaSkala})`;
  }, {passive: false});

  // Pokretanje swipe kretanja prstom
  setupSwipeGestures();
 }

 function okreniLevo() { if (trenutniIndeks > 0) { prikaziStranicu(trenutniIndeks - 1); } }
 function okreniDesno() { if (trenutniIndeks < sveStranice.length - 1) { prikaziStranicu(trenutniIndeks + 1); } }

 // 3. DETEKCIJA HORIZONTALNOG SVIPE POKRETA (Radi i kada je tekst zumiran)
 function setupSwipeGestures() {
  let startX = 0;
  let startY = 0;
  const kontejner = document.getElementById('book-container');

  kontejner.addEventListener('touchstart', e => {
   if (e.touches.length === 1) {
     startX = e.touches[0].screenX;
     startY = e.touches[0].screenY;
   }
  }, {passive: true});

  kontejner.addEventListener('touchend', e => {
   if (e.changedTouches.length === 1) {
     let endX = e.changedTouches.screenX;
     let endY = e.changedTouches.screenY;
     
     let razlikaX = startX - endX;
     let razlikaY = Math.abs(startY - endY);
     
     // Pokreće listanje samo ako je pokret čist horizontalan (širi od 50px) i nije obično skrolovanje na dole
     if (Math.abs(razlikaX) > 50 && razlikaY < 40) {
       if (razlikaX > 0) {
         okreniDesno(); // Pomeranje prsta ulevo -> Sledeća strana
       } else {
         okreniLevo();  // Pomeranje prsta udesno -> Prethodna strana
       }
     }
   }
  }, {passive: true});
 }

 // Tastatura
 document.addEventListener('keydown', e => {
  if (e.key === "ArrowRight") okreniDesno();
  if (e.key === "ArrowLeft") okreniLevo();
 });

 document.getElementById("redox-pass").addEventListener("keyup", function(event) {
  if (event.key === "Enter") verifyRedoxVault();
 });
 </script>
</body>
</html>
