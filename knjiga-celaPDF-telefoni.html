<!DOCTYPE html>
<html lang="sr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>REDOKS JURIŠ - Protokol Loboda</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: monospace; background-color: #020617; color: #cbd5e1; text-align: center; overflow: hidden; }
 
 /* Sigurnosna kapija */
 .lock-container { padding: 40px 20px; max-width: 400px; margin: 100px auto auto auto; background: #0f172a; border: 2px solid #334155; border-radius: 8px; }
 input[type="password"] { width: 80%; padding: 12px; background: #020617; border: 1px solid #334155; color: #00ffcc; text-align: center; margin-bottom: 20px; outline: none; }
 .btn-submit { padding: 12px 25px; background: #d4af37; color: #020617; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; }
 .error-msg { color: #ff3366; margin-top: 15px; display: none; }
 
 /* Čitač i Klizač na vrhu */
 #book-viewer-zone { display: none; width: 100vw; height: 100vh; flex-direction: column; }
 .viewer-header { height: 60px; background: #020617; border-bottom: 1px solid #334155; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px 20px; gap: 4px; }
 .slider-container { width: 100%; display: flex; align-items: center; }
 .page-slider { width: 100%; -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 3px; outline: none; }
 .page-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer; }
 
 /* Okvir za horizontalni prikaz knjige */
 #pdf-frame-container { flex: 1; width: 100vw; background-color: #0f172a; position: relative; }
 iframe { width: 100%; height: 100%; border: none; }
 .touch-navigator { position: absolute; top: 0; bottom: 0; width: 20%; z-index: 999; cursor: pointer; }
 .nav-left { left: 0; }
 .nav-right { right: 0; }
 </style>
</head>
<body>

 <!-- KAPĲA ZA ŠIFRU -->
 <div class="lock-container" id="lock-screen">
 <h2 style="color: #38bdf8; margin-bottom: 20px;">🔒 REDOKS JURIŠ</h2>
 <input type="password" id="redox-pass" placeholder="UNESITE ŠIFRU">
 <br>
 <button class="btn-submit" onclick="verifyRedoxVault()">PRISTUPI KNJIZI</button>
 <div class="error-msg" id="error-box">Netačan bezbednosni kôd!</div>
 </div>

 <!-- PROZOR ČITAČA SA KLIZAČEM NA VRHU -->
 <div id="book-viewer-zone">
 <div class="viewer-header">
 <div style="width:100%; display:flex; justify-content:space-between; font-size:12px; color:#38bdf8;">
 <span>📖 Knjiga 2 (Original PDF)</span>
 <span id="page-indicator">Brzo skrolovanje</span>
 </div>
 <div class="slider-container">
 <!-- Klizač na vrhu koji simulira ubrzani juriš kroz stranice -->
 <input type="range" id="page-slider" class="page-slider" min="1" max="100" value="1" oninput="onSliderMove(this.value)">
 </div>
 </div>
 
 <div id="pdf-frame-container">
 <!-- Nevidljive zone koje omogućavaju brzi skok na dodir levo-desno -->
 <div class="touch-navigator nav-left" onclick="okreniLevo()"></div>
 <iframe id="secure-pdf-frame" src=""></iframe>
 <div class="touch-navigator nav-right" onclick="okreniDesno()"></div>
 </div>
 </div>

 <script>
 // Pozivamo tačan naziv nove datoteke koju ste verifikovali
 var putanjaDoKnjige = "./Knjiga2.pdf"; 
 var mojIframe = document.getElementById('secure-pdf-frame');
 var mojSlider = document.getElementById('page-slider');

 function verifyRedoxVault() {
 var inputPass = document.getElementById("redox-pass").value.trim();
 if (inputPass === "REDOX2026") {
 document.getElementById("lock-screen").style.display = "none";
 document.getElementById("book-viewer-zone").style.display = "flex";
 // Tek nakon tačne šifre ubacujemo PDF u prozor
 mojIframe.src = putanjaDoKnjige + "#toolbar=0&navpanes=0&scrollbar=0";
 setupSwipeGestures();
 } else {
 document.getElementById("error-box").style.display = "block";
 }
 }

 // Funkcija klizača na vrhu ekrana
 function onSliderMove(vrednost) {
 document.getElementById('page-indicator').innerText = "Pozicija: " + vrednost + "%";
 // Slanje komande nativnom čitaču telefona da skoči na procenat stranice
 mojIframe.src = putanjaDoKnjige + "#page=" + Math.ceil(vrednost) + "&toolbar=0&navpanes=0";
 }

 // Horizontalna navigacija na dodir ivica ekrana (Levo-Desno)
 function okreniLevo() {
 var trenutnaVrednost = parseInt(mojSlider.value);
 if (trenutnaVrednost > 1) {
 mojSlider.value = trenutnaVrednost - 5;
 onSliderMove(mojSlider.value);
 }
 }

 function okreniDesno() {
 var trenutnaVrednost = parseInt(mojSlider.value);
 if (trenutnaVrednost < 100) {
 mojSlider.value = trenutnaVrednost + 5;
 onSliderMove(mojSlider.value);
 }
 }

 // Detekcija prevlačenja prsta preko ekrana (Swipe levo-desno)
 function setupSwipeGestures() {
 let startX = 0;
 document.getElementById('pdf-frame-container').addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; }, {passive: true});
 document.getElementById('pdf-frame-container').addEventListener('touchend', e => {
 let endX = e.changedTouches[0].screenX;
 if (startX - endX > 50) okreniDesno(); // prst ide ulevo -> knjiga ide napred
 if (endX - startX > 50) okreniLevo(); // prst ide udesno -> knjiga ide nazad
 }, {passive: true});
 }

 document.getElementById("redox-pass").addEventListener("keyup", function(event) {
 if (event.key === "Enter") verifyRedoxVault();
 });
 </script>
</body>
</html>
