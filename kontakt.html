<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDOX JURIŠ - Kontakt i Podrška</title>
    <style>
        body {
            font-family: monospace;
            background-color: #020617;
            color: #cbd5e1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .contact-container {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            border: 2px solid #334155;
            border-top: 6px solid #38bdf8;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .neon-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #38bdf8;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .info-box {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid #1e293b;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .info-item {
            margin-bottom: 15px;
            border-bottom: 1px dashed #1e293b;
            padding-bottom: 10px;
        }
        .info-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .label {
            color: #64748b;
            font-size: 0.9em;
            text-transform: uppercase;
            display: block;
        }
        .value {
            color: #00ffcc;
            font-size: 1.1em;
            font-weight: bold;
        }
        .btn-back {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 12px 30px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.95em;
            text-decoration: none;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="neon-title">📞 REZURSNI KONTAKT INFO</div>
        
        <div class="info-box">
            <div class="info-item">
                <span class="label">Autor projekta i monografije:</span>
                <span class="value" style="color: #ffffff;">Master inženjer Dragan Loboda</span>
            </div>
            <div class="info-item">
                <span class="label">Mobilni telefon / Resursni kontakt:</span>
                <span class="value">064 8813345</span>
            </div>
            <div class="info-item">
                <span class="label">Zvanična e-adresa:</span>
                <span class="value">lobodasd@gmail.com</span>
            </div>
        </div>

        <a href="index.html" class="btn-back">Nazad na početnu</a>
    </div>

</body>
</html>
