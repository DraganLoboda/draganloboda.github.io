<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REDOKS JURIŠ - FIXED READER</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;color:#cbd5e1;font-family:monospace;overflow:hidden}

/* LOCK */
#lock{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#0f172a;padding:25px;border-radius:12px;border:2px solid #334155;
text-align:center;width:90%;max-width:400px;z-index:10
}
input,button{font-family:monospace}
input{
width:80%;padding:12px;background:#020617;border:1px solid #334155;
color:#00ffcc;text-align:center
}
button{margin-top:15px;padding:10px 20px;border:1px solid #00ffcc;background:transparent;color:#00ffcc}

/* VIEWER */
#viewer{
display:none;
flex-direction:column;
height:100vh;
width:100vw;
max-width:100vw;
background:#020617
}

/* HEADER MINIMAL */
.header{
height:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
border-bottom:1px solid #334155;
font-size:12px
}

/* SLIDER SMALL */
.slider{
width:100%;
height:18px
}

/* MAIN AREA FULL */
.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative
}

canvas{
max-width:100vw;
max-height:100vh;
touch-action:none;
}

/* TOUCH ZONES */
.zone{
position:absolute;top:0;bottom:0;width:18%;
z-index:5
}
.left{left:0}
.right{right:0}
</style>
</head>

<body>

<div id="lock">
<div style="color:#38bdf8;margin-bottom:12px">🔒 REDOKS JURIŠ</div>
<input id="pass" type="password" placeholder="ŠIFRA">
<br>
<button onclick="login()">ULAZ</button>
</div>

<div id="viewer">

<div class="header">
<span>📖 KNJIGA</span>
<span id="info">1/1</span>
</div>

<input class="slider" type="range" id="slider" min="1" value="1" oninput="go(this.value)">

<div class="container" id="box">
<div class="zone left" onclick="prev()"></div>
<canvas id="c"></canvas>
<div class="zone right" onclick="next()"></div>
</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url="./Knjiga2.pdf";

let pdf=null,page=1,rendering=false;

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function login(){
if(document.getElementById("pass").value==="REDOX2026"){
document.getElementById("lock").style.display="none";
document.getElementById("viewer").style.display="flex";
load();
}
}

function load(){
pdfjsLib.getDocument(url).promise.then(p=>{
pdf=p;
document.getElementById("slider").max=pdf.numPages;
render(page);
});
}

function render(n){
if(rendering)return;
rendering=true;

pdf.getPage(n).then(p=>{

const screenW = window.innerWidth;
const screenH = window.innerHeight;

const vp = p.getViewport({scale:1});

/* AUTO FIT (FIX FOR PC + MOBILE + LANDSCAPE) */
let scaleW = screenW / vp.width;
let scaleH = screenH / vp.height;

/* malo manji faktor da ne "seče" tekst */
let scale = Math.min(scaleW, scaleH) * 0.98;

const view = p.getViewport({scale});

canvas.width=view.width;
canvas.height=view.height;

p.render({canvasContext:ctx,viewport:view}).promise.then(()=>{
rendering=false;
});

document.getElementById("info").innerText=n+"/"+pdf.numPages;
document.getElementById("slider").value=n;
});
}

function next(){if(page<pdf.numPages){page++;render(page)}}
function prev(){if(page>1){page--;render(page)}}
function go(v){page=parseInt(v);render(page)}

</script>

</body>
</html>
