<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sabiranja</title>
    <style>
        body { font-family: sans-serif; background-color: #0a0f1d; color: white; padding: 40px; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: #141d34; padding: 20px; border-radius: 10px; border: 1px solid #00ffcc; }
        input { width: 60px; padding: 10px; margin: 10px; text-align: center; font-size: 18px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 16px; font-weight: bold; background: #00ffcc; color: #0a0f1d; border: none; border-radius: 5px; cursor: pointer; }
        .result-box { margin-top: 20px; font-size: 22px; font-weight: bold; color: #00ffcc; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Test Dugmeta (Sabiranje)</h2>
    
    <input type="number" id="broj1" value="5" min="0" max="9">
    <span style="font-size: 24px;">+</span>
    <input type="number" id="broj2" value="3" min="0" max="9">
    
    <br><br>
    <button onclick="izracunajZbir()">POKRENI TEST</button>
    
    <div id="prikazZbira" class="result-box">
        Rezultat: <span id="zbirVrednost">0</span>
    </div>
</div>

<script>
    function izracunajZbir() {
        var a = Number(document.getElementById('broj1').value);
        var b = Number(document.getElementById('broj2').value);
        
        var rez = a + b;
        
        document.getElementById('zbirVrednost').innerText = rez;
        document.getElementById('prikazZbira').style.display = 'block';
    }
</script>

</body>
</html>
